
<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>市场分析Dashboard</title>

    <style>

        body{
            margin:0;
            background:#111;
            font-family:Arial;
        }

        .tab{
            background:#1b1b1b;
            padding:15px;
        }

        .tab button{

            background:#333;
            color:white;
            border:none;
            padding:12px 20px;
            margin-right:10px;
            border-radius:8px;
            cursor:pointer;
            font-size:15px;
        }

        .tab button:hover{
            background:#555;
        }

        iframe{
            width:100%;
            height:900px;
            border:none;
        }

    </style>
</head>

<body>

<div class="tab">

    <button onclick="changePage('bar.html')">
        每日统计
    </button>

    <button onclick="changePage('heat.html')">
        行业热力
    </button>

    <button onclick="changePage('timeline.html')">
        行业轮动
    </button>

</div>

<iframe
    id="frame"
    src="bar.html">
</iframe>

<script>

function changePage(page){

    document.getElementById("frame").src = page;

}

</script>

</body>
</html>
