
<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>市场分析Dashboard</title>

    <style>

        body{
            margin:0;
            background:#111;
            font-family:Arial;
        }

        .tab{
            background:#1b1b1b;
            padding:15px;
        }

        .tab button{

            background:#333;
            color:white;
            border:none;
            padding:12px 20px;
            margin-right:10px;
            border-radius:8px;
            cursor:pointer;
            font-size:15px;
        }

        .tab button:hover{
            background:#555;
        }

        iframe{
            width:100%;
            height:900px;
            border:none;
        }

    </style>
</head>


<body>
<div class="tab">

    <button onclick="changePage('bar.html')">
        每日成交额TOP50新增个股统计
    </button>

    <button onclick="changePage('heat.html')">
        新增股票行业热力分析
    </button>

    <button onclick="showImage()">
        新增股票行业热力图
    </button>

    <button onclick="changePage('timeline.html')">
        新增股票行业轮动
    </button>

</div>

<iframe
    id="frame"
    src="bar.html">
</iframe>



<div
    id="imageBox"
    style="
        display:none;
        text-align:center;
        padding:20px;
        position:relative;
        z-index:9999;
        background:#111;
        min-height:100vh;
    "
>

    <img
        src="./new_heatmap.png"
        style="
            max-width:65%;
            height:auto;
            border-radius:12px;
            box-shadow:0 0 20px rgba(255,255,255,0.15);
        "
    >

</div>

<script>

function changePage(page){

    document.getElementById("frame").style.display = "block";

    document.getElementById("imageBox").style.display = "none";

    document.getElementById("frame").src = page;

}

function showImage(){

    document.getElementById("frame").style.display = "none";

    document.getElementById("imageBox").style.display = "block";

}

</script>

</body>
