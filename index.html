
<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>市场分析Dashboard</title>
    <script src="https://assets.pyecharts.org/assets/v5/echarts.min.js"></script>
    <style>

    body{
        margin:0;
        background:#111;
        font-family:Arial;
    }

    .tab{
        background:#1b1b1b;
        padding:15px;
    }

    .tab button{

        background:#333;
        color:white;
        border:none;
        padding:12px 20px;
        margin-right:10px;
        border-radius:8px;
        cursor:pointer;
        font-size:15px;
    }

    .tab button:hover{
        background:#555;
    }

    /* 新增：左右布局 */

    .main-container{

        position:relative;

        width:100%;

        height:820px;
    }

    iframe{

        width:100%;

        height:100%;

        border:none;
    }
    #futureChartArea{

    width:100%;

    background:#111;

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    gap:20px;

    padding:20px;

    box-sizing:border-box;
    }

    .futureChartBox{

        width:520px;

        height:420px;

        background:#1b1b1b;

        border-radius:12px;

        padding:10px;
    }
    </style>
</head>


<body>
<div class="tab">

    <button onclick="changePage('bar.html')">
        每日成交额TOP50新增个股统计
    </button>

    <button onclick="changePage('heat.html')">
        新增股票行业热力分析
    </button>

    <button onclick="showImage()">
        新增股票行业热力图
    </button>

    <button onclick="changePage('timeline.html')">
        新增股票行业轮动
    </button>

</div>




<div class="main-container"
     id="mainContainer"
>

    <iframe
        id="frame"
        src="bar.html">
    </iframe>

</div>

<!-- 未来走势区域 -->
<div id="futureChartArea"></div>



<!-- 放图片 -->
<div
    id="imageBox"
    style="
        display:none;

        width:100%;
        height:900px;

        background:#111;

        justify-content:center;
        align-items:flex-star;

        padding:20px;
        box-sizing:border-box;
    "
>
    <img
        src="./new_heatmap.png"
        style="
            max-width:90%;
            max-height:800px; /* 限制最大高度，避免撑破容器 */
            height:auto;
            border-radius:12px;
            box-shadow:0 0 20px rgba(255,255,255,0.15);
        "
    >
</div>



<script>
function changePage(page){

    // 显示主图区域
    document.getElementById("mainContainer").style.display = "block";

    // 隐藏图片
    document.getElementById("imageBox").style.display = "none";

    // 切换 iframe
    document.getElementById("frame").src = page;

    // ======================
    // 控制 futureChartArea
    // ======================

    // bar 页面显示
    if(page === "bar.html"){

        document.getElementById("futureChartArea").style.display = "flex";

    }

    // 其它页面隐藏
    else{

        document.getElementById("futureChartArea").style.display = "none";

    }

}


function showImage(){

    // 整个主图区域消失
    document.getElementById("mainContainer").style.display = "none";

    // 显示热力图
    document.getElementById("imageBox").style.display = "flex";

}


</script>


</body>
</html>
