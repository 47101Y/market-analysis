<body>

<div class="tab">
    <button onclick="changePage('bar.html')">每日成交额TOP50新增个股统计</button>
    <button onclick="changePage('heat.html')">新增股票行业热力分析</button>
    <button onclick="showImage()">新增股票行业热力图</button>
    <button onclick="changePage('timeline_v2.html')">新增股票行业轮动</button>
    <button onclick="showPositiveCum()">最新日期累计增幅为正</button>
</div>

<div class="main-container" id="mainContainer">
    <iframe id="frame" src="bar.html"></iframe>
</div>

<!-- 未来走势区域 -->
<div id="futureChartArea"></div>

<!-- 放图片 -->
<div id="imageBox" style="
    display:none;
    width:100%;
    height:900px;
    background:#111;
    justify-content:center;
    align-items:flex-start;
    padding:20px;
    box-sizing:border-box;
">
    <img src="./new_heatmap.png" style="
        max-width:90%;
        max-height:800px;
        height:auto;
        border-radius:12px;
        box-shadow:0 0 20px rgba(255,255,255,0.15);
    ">
</div>

<script src="positive_cum_data.js?v=2026-05-26-d11-snap42"></script>
<script>
var MAX_DISPLAY_DAY = 10;

function trimFutureRows(futureList, maxDay) {
    maxDay = maxDay == null ? MAX_DISPLAY_DAY : maxDay;
    var rows = [];
    for (var i = 0; i < futureList.length; i++) {
        var row = futureList[i];
        if (row.day > maxDay) break;
        var o = row.open, c = row.close;
        if (o == null || c == null || o === '' || c === '' || isNaN(Number(o))) break;
        rows.push(row);
    }
    return rows;
}

function buildStockCardHtml(name, stock, futureRows, summaryPct, asOfDate) {
    var html = '<div class="stock-card">';
    html += '<h3 class="stock-title">' + name + '（' + stock + '）</h3>';
    if (summaryPct !== undefined && summaryPct !== null) {
        var scls = summaryPct > 0 ? 'summary-up' : 'summary-down';
        var label = asOfDate ? ('截至 ' + asOfDate + ' 自T+1累计：') : '截至当日自T+1累计：';
        html += '<p class="stock-summary ' + scls + '">' + label + (summaryPct * 100).toFixed(2) + '%</p>';
    }
    html += '<table class="stock-table"><thead><tr>';
    html += '<th>第N日</th><th>开盘价</th><th>收盘价</th><th>自T+1日涨跌幅</th>';
    html += '</tr></thead><tbody>';
    futureRows.forEach(function (row) {
        var cls = row.cum_pct > 0 ? 'pct-up' : 'pct-down';
        html += '<tr><td>' + row.day + '</td><td>' + row.open + '</td><td>' + row.close + '</td>';
        html += '<td class="' + cls + '">' + (row.cum_pct * 100).toFixed(2) + '%</td></tr>';
    });
    html += '</tbody></table></div>';
    return html;
}

function buildDateHeaderHtml(date, threshold, extra) {
    var html = '<div class="date-header"><h3>' + date + ' 第50名成交额：' + threshold + ' 亿元</h3>';
    if (extra) html += '<p>' + extra + '</p>';
    html += '</div>';
    return html;
}

function renderPositiveSnapshot(snapshot, asOfDate) {
    var content = document.getElementById('positiveCumContent');
    if (!content) return;
    content.innerHTML = '';

    if (!snapshot || !snapshot.sections || snapshot.sections.length === 0) {
        content.innerHTML = '<p style="color:#999;width:100%;text-align:center;padding:30px;">'
            + asOfDate + ' 暂无累计为正的股票（或该日尚无足够 T+1 数据）</p>';
        return;
    }

    snapshot.sections.forEach(function (section) {
        content.insertAdjacentHTML('beforeend', buildDateHeaderHtml(
            section.date,
            section.threshold,
            '本日累计为正 ' + section.stocks.length + ' 只（统计至 ' + asOfDate + '）'
        ));
        var row = document.createElement('div');
        row.className = 'card-row';
        section.stocks.forEach(function (stock) {
            var wrap = document.createElement('div');
            wrap.className = 'stock-card-wrap';
            wrap.innerHTML = buildStockCardHtml(
                stock.name, stock.stock,
                trimFutureRows(stock.future, MAX_DISPLAY_DAY),
                stock.cum_pct,
                asOfDate
            );
            row.appendChild(wrap);
        });
        content.appendChild(row);
    });
}

function setCutoffDate(dateStr) {
    var data = window.positiveCumData;
    if (!data || !data.snapshots) return;

    var snapshot = data.snapshots[dateStr];
    if (!snapshot) return;

    window._currentCutoff = dateStr;

    var label = document.getElementById('cutoffDateLabel');
    if (label) {
        label.innerHTML = '当前查看：<b>' + dateStr + '</b>（共 ' + snapshot.total + ' 只累计为正）';
    }

    var slider = document.getElementById('cutoffSlider');
    if (slider && data.cutoff_dates) {
        slider.value = data.cutoff_dates.indexOf(dateStr);
    }

    document.querySelectorAll('.cutoff-btn').forEach(function (btn) {
        btn.classList.toggle('active', btn.getAttribute('data-date') === dateStr);
    });

    renderPositiveSnapshot(snapshot, dateStr);
}

function showPositiveCum() {
    document.getElementById('imageBox').style.display = 'none';
    document.getElementById('mainContainer').style.display = 'none';

    var area = document.getElementById('futureChartArea');
    area.innerHTML = '';
    area.style.display = 'flex';

    var data = window.positiveCumData;
    if (!data || !data.snapshots || !data.cutoff_dates) {
        area.innerHTML = '<p style="color:#999;width:100%;text-align:center;padding:40px;">请先运行 python index1.py 生成 positive_cum_data.js</p>';
        return;
    }

    var intro = document.createElement('div');
    intro.className = 'section-intro';
    intro.innerHTML =
        '<h2>最新日期累计增幅为正 · 日期存档</h2>' +
        '数据范围：<b style="color:#fff;">' + data.cutoff_dates[0] + '</b> 至 <b style="color:#fff;">' + data.latest_date + '</b><br>' +
        '规则：每个截止日，取该日前最近 <b style="color:#fff;">' + data.lookback_days + '</b> 个入选日的新增股，' +
        '从 <b style="color:#fff;">T+1 开盘价</b> 持有至 <b style="color:#fff;">截止日收盘价</b> 累计涨幅 &gt; 0。<br>' +
        '下方选择日期，可查看<strong>截至该日</strong>累计为正的股票及逐日走势。';
    area.appendChild(intro);

    var panel = document.createElement('div');
    panel.className = 'cutoff-panel';
    panel.innerHTML =
        '<p class="cutoff-panel__title">选择截止交易日</p>' +
        '<p class="cutoff-panel__current" id="cutoffDateLabel"></p>' +
        '<div class="cutoff-nav">' +
        '<button type="button" id="cutoffPrev">◀ 上一日</button>' +
        '<button type="button" id="cutoffNext">下一日 ▶</button>' +
        '<button type="button" id="cutoffLatest">最新日</button>' +
        '</div>' +
        '<input type="range" class="cutoff-slider" id="cutoffSlider" min="0" max="' + (data.cutoff_dates.length - 1) + '" value="' + (data.cutoff_dates.length - 1) + '">' +
        '<div class="cutoff-dates" id="cutoffDates"></div>';
    area.appendChild(panel);

    var datesWrap = panel.querySelector('#cutoffDates');
    data.cutoff_dates.forEach(function (d) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'cutoff-btn';
        btn.setAttribute('data-date', d);
        btn.textContent = d.slice(5);
        btn.onclick = function () { setCutoffDate(d); };
        datesWrap.appendChild(btn);
    });

    var content = document.createElement('div');
    content.id = 'positiveCumContent';
    area.appendChild(content);

    var slider = document.getElementById('cutoffSlider');
    slider.oninput = function () {
        setCutoffDate(data.cutoff_dates[parseInt(slider.value, 10)]);
    };

    document.getElementById('cutoffPrev').onclick = function () {
        var i = data.cutoff_dates.indexOf(window._currentCutoff || data.default_cutoff);
        if (i > 0) setCutoffDate(data.cutoff_dates[i - 1]);
    };

    document.getElementById('cutoffNext').onclick = function () {
        var i = data.cutoff_dates.indexOf(window._currentCutoff || data.default_cutoff);
        if (i < data.cutoff_dates.length - 1) setCutoffDate(data.cutoff_dates[i + 1]);
    };

    document.getElementById('cutoffLatest').onclick = function () {
        setCutoffDate(data.latest_date);
    };

    setCutoffDate(data.default_cutoff || data.latest_date);
    window.scrollTo(0, 0);
}

function changePage(page) {
    document.getElementById("futureChartArea").innerHTML = "";
    document.getElementById("imageBox").style.display = "none";
    document.getElementById("mainContainer").style.display = "block";
    document.getElementById("frame").src = page;

    if (page === "bar.html") {
        document.getElementById("futureChartArea").style.display = "flex";
        document.getElementById("frame").onload = addHintToBarChart;
    } else {
        document.getElementById("futureChartArea").style.display = "none";
        document.getElementById("frame").onload = null;
    }
}

function showImage() {
    document.getElementById("futureChartArea").innerHTML = "";
    document.getElementById("futureChartArea").style.display = "none";
    document.getElementById("mainContainer").style.display = "none";
    document.getElementById("imageBox").style.display = "flex";
}

function addHintToBarChart() {
    const iframe = document.getElementById("frame");
    if (!iframe) return;

    // 轮询等待图表加载完成
    const timer = setInterval(() => {
        try {
            const chart = iframe.contentWindow.myChart;
            if (chart) {
                const hintText = " 点击新增柱体，查看未来走势详情";
                const verticalText = hintText.split('').join('\n');

                chart.setOption({
                    graphic: {
                        elements: [{
                            type: "text",
                            right: "6.5%",
                            top: "30%",
                            silent: true,
                            z: 100,
                            style: {
                                text: verticalText,
                                fontSize: 16,
                                fontWeight: "bold",
                                fill: "#ffffff",
                                opacity: 0.8,
                                textAlign: "center",
                                lineHeight: 20
                            }
                        }]
                    }
                });
                clearInterval(timer); // 找到后停止轮询
            }
        } catch (e) {}
    }, 100);
}

window.onload = function () {

    var iframe = document.getElementById('frame');

    // 默认首页直接添加提示
    addHintToBarChart();

    // 后续切换页面继续监听
    iframe.addEventListener('load', function () {

        if (iframe.src.includes('bar.html')) {
            addHintToBarChart();
        }

    });
};
</script>

</body>
</html>
