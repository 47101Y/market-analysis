
<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>市场分析Dashboard</title>

    <style>

    body{
        margin:0;
        background:#111;
        font-family:Arial;
    }

    .tab{
        background:#1b1b1b;
        padding:15px;
    }

    .tab button{

        background:#333;
        color:white;
        border:none;
        padding:12px 20px;
        margin-right:10px;
        border-radius:8px;
        cursor:pointer;
        font-size:15px;
    }

    .tab button:hover{
        background:#555;
    }

    /* 新增：左右布局 */

    .main-container{

        position:relative;

        width:100%;

        height:900px;
    }

    iframe{

        width:100%;

        height:100%;

        border:none;
    }

    #detailPanel{

        display:none;

        position:absolute;

        top:0;

        right:0;

        width:360px;

        height:100%;

        background:#1b1b1b;

        color:white;

        padding:20px;

        overflow-y:auto;

        border-left:1px solid #333;

        box-sizing:border-box;

        z-index:999;
    }
    </style>
</head>


<body>
<div class="tab">

    <button onclick="changePage('bar.html')">
        每日成交额TOP50新增个股统计
    </button>

    <button onclick="changePage('heat.html')">
        新增股票行业热力分析
    </button>

    <button onclick="showImage()">
        新增股票行业热力图
    </button>

    <button onclick="changePage('timeline.html')">
        新增股票行业轮动
    </button>

</div>

<div class="main-container">

    <iframe
        id="frame"
        src="bar.html">
    </iframe>

    <div id="detailPanel">

        <h2>股票详情</h2>

        <div id="detailContent">
            点击柱体查看详情
        </div>

    </div>

</div>


<!-- 放图片 -->
<div
    id="imageBox"
    style="
        display:none;
        width:100%;
        height:900px;

        background:#111;

        display:flex;
        justify-content:center;
        align-items:center;
    "
>
    <img
        src="./new_heatmap.png"
        style="
            max-width:90%;
            max-height:90%;

            border-radius:12px;

            box-shadow:0 0 20px rgba(255,255,255,0.15);
        "
    >
</div>

<script>

function changePage(page){

    document.getElementById("frame").style.display = "block";

    document.getElementById("imageBox").style.display = "none";

    document.getElementById("frame").src = page;

    // 只有 bar 页面显示详情栏

    if(page === "bar.html"){

        document.getElementById("detailPanel").style.display = "block";

    }

    // 其它页面隐藏

    else{

        document.getElementById("detailPanel").style.display = "none";

    }

}


function showImage(){

    document.getElementById("frame").style.display = "none";

    document.getElementById("imageBox").style.display = "block";

    document.getElementById("detailPanel").style.display = "none";

}
// 页面初始化

window.onload = function(){

    document.getElementById("detailPanel").style.display = "block";

}

</script>


</body>
