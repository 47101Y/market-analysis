<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>每日成交额TOP50新增股票未来十日追踪</title>
    <script src="https://assets.pyecharts.org/assets/v5/echarts.min.js"></script>
    <style>

    body{
        margin:0;
        padding:0;
        background:#111;
        font-family:Arial;
        overflow-x: hidden;
    }

    .tab{
        background:#1b1b1b;
        padding:15px;
    }

    .tab button{
        background:#333;
        color:white;
        border:none;
        padding:12px 20px;
        margin-right:10px;
        border-radius:8px;
        cursor:pointer;
        font-size:15px;
    }

    .tab button:hover{
        background:#555;
    }

    .main-container{
        position:relative;
        width:100%;
        height: calc(100vh - 80px);
        background:#111;
        overflow:hidden;
    }

    iframe{
        width:100%;
        height:100%;
        border:none;
        background:transparent;
        margin:0;
        padding:0;
        display: block;
    }

    #futureChartArea{
        width:100%;
        background:#111;
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
        align-content:flex-start;
        gap:20px;
        padding:20px;
        box-sizing:border-box;
    }

    .positive-intro{
        width:100%;
        padding:15px 20px;
        color:#8b9cb3;
        background:#1a1a1a;
        border-radius:10px;
        margin-bottom:10px;
        line-height:1.6;
        font-size:14px;
    }

    .positive-intro h2{
        margin:0 0 8px;
        color:#ffd666;
        font-size:20px;
    }

    .positive-date-header{
        width:100%;
        padding:15px;
        color:#fff;
        background:#1f1f1f;
        border-radius:10px;
        margin:10px 0 20px;
        box-sizing:border-box;
    }

    .positive-card-row{
        width:100%;
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
        gap:20px;
        margin-bottom:30px;
    }

    .positive-stock-card{
        width:480px;
        flex-shrink:0;
    }

    .futureChartBox{
        width:520px;
        height:420px;
        background:#1b1b1b;
        border-radius:12px;
        padding:10px;
    }

    </style>
</head>

<body>

<div class="tab">
    <button onclick="changePage('bar.html')">每日成交额TOP50新增个股统计</button>
    <button onclick="changePage('heat.html')">新增股票行业热力分析</button>
    <button onclick="showImage()">新增股票行业热力图</button>
    <button onclick="changePage('timeline_v2.html')">新增股票行业轮动</button>
    <button onclick="showPositiveCum()">最新日期累计增幅为正</button>
</div>

<div class="main-container" id="mainContainer">
    <iframe id="frame" src="bar.html"></iframe>
</div>

<!-- 未来走势区域 -->
<div id="futureChartArea"></div>

<!-- 放图片 -->
<div id="imageBox" style="
    display:none;
    width:100%;
    height:900px;
    background:#111;
    justify-content:center;
    align-items:flex-start;
    padding:20px;
    box-sizing:border-box;
">
    <img src="./new_heatmap.png" style="
        max-width:90%;
        max-height:800px;
        height:auto;
        border-radius:12px;
        box-shadow:0 0 20px rgba(255,255,255,0.15);
    ">
</div>

<script src="positive_cum_data.js"></script>
<script>
/** 与第一板块点击「新增」后相同的单股纵向表格 */
function buildStockCardHtml(name, stock, futureRows, summaryPct) {
    var html = '';
    html += '<div style="background:#1f1f1f; padding:15px; border-radius:10px; color:white;">';
    html += '<h3 style="text-align:center; margin-bottom:8px; color:#ffd666;">';
    html += name + '（' + stock + '）';
    html += '</h3>';
    if (summaryPct !== undefined && summaryPct !== null) {
        var sumColor = summaryPct > 0 ? '#ff4d4f' : '#52c41a';
        html += '<p style="text-align:center; margin:0 0 12px; font-size:13px; color:' + sumColor + ';">';
        html += '截至最新日自T+1累计：' + (summaryPct * 100).toFixed(2) + '%';
        html += '</p>';
    }
    html += '<table style="width:100%; border-collapse:collapse; text-align:center; font-size:13px;">';
    html += '<tr style="background:#333;">';
    html += '<th style="padding:8px; border:1px solid #555;">第N日</th>';
    html += '<th style="padding:8px; border:1px solid #555;">开盘价</th>';
    html += '<th style="padding:8px; border:1px solid #555;">收盘价</th>';
    html += '<th style="padding:8px; border:1px solid #555;">自T+1日涨跌幅</th>';
    html += '</tr>';

    futureRows.forEach(function (row) {
        var color = row.cum_pct > 0 ? '#ff4d4f' : '#52c41a';
        var pct = (row.cum_pct * 100).toFixed(2) + '%';
        html += '<tr>';
        html += '<td style="padding:6px; border:1px solid #444;">' + row.day + '</td>';
        html += '<td style="padding:6px; border:1px solid #444;">' + row.open + '</td>';
        html += '<td style="padding:6px; border:1px solid #444;">' + row.close + '</td>';
        html += '<td style="padding:6px; border:1px solid #444; color:' + color + '; font-weight:bold;">' + pct + '</td>';
        html += '</tr>';
    });

    html += '</table></div>';
    return html;
}

function showPositiveCum() {
    document.getElementById("imageBox").style.display = "none";
    document.getElementById("mainContainer").style.display = "none";

    var area = document.getElementById("futureChartArea");
    area.innerHTML = "";
    area.style.display = "flex";

    var data = window.positiveCumData;
    if (!data || !data.sections) {
        area.innerHTML = '<p style="color:#999;width:100%;text-align:center;padding:40px;">请先在本目录运行 python index1.py 生成 positive_cum_data.js</p>';
        return;
    }

    var intro = document.createElement('div');
    intro.className = 'positive-intro';
    intro.innerHTML =
        '<h2>最新日期累计增幅为正</h2>' +
        '统计截至：<b style="color:#fff;">' + data.latest_date + '</b><br>' +
        '入选日范围（最近 ' + data.lookback_dates.length + ' 个交易日）：' + data.lookback_dates.join('、') + '<br>' +
        '规则：从 <b style="color:#fff;">T+1 开盘价</b> 持有至 <b style="color:#fff;">' + data.latest_date + '</b> 收盘价累计涨幅 &gt; 0。' +
        '下列每只股票展示从入选日至最新日各日走势（仅显示有数据的天数）。';
    area.appendChild(intro);

    if (data.sections.length === 0) {
        var empty = document.createElement('p');
        empty.style.cssText = 'color:#999;width:100%;text-align:center;';
        empty.textContent = '暂无符合条件的股票';
        area.appendChild(empty);
        return;
    }

    data.sections.forEach(function (section) {
        var header = document.createElement('div');
        header.className = 'positive-date-header';
        header.innerHTML =
            '<h3 style="margin:0 0 6px;font-size:18px;">' + section.date + ' 第50名成交额：' + section.threshold + ' 亿元</h3>' +
            '<p style="margin:0;color:#8b9cb3;font-size:13px;">本日累计为正 ' + section.stocks.length + ' 只（统计至 ' + data.latest_date + '）</p>';
        area.appendChild(header);

        var row = document.createElement('div');
        row.className = 'positive-card-row';

        section.stocks.forEach(function (stock) {
            var wrap = document.createElement('div');
            wrap.className = 'positive-stock-card';
            wrap.innerHTML = buildStockCardHtml(stock.name, stock.stock, stock.future, stock.cum_pct);
            row.appendChild(wrap);
        });

        area.appendChild(row);
    });

    window.scrollTo(0, 0);
}

function changePage(page) {
    document.getElementById("futureChartArea").innerHTML = "";
    document.getElementById("imageBox").style.display = "none";
    document.getElementById("mainContainer").style.display = "block";
    document.getElementById("frame").src = page;

    if (page === "bar.html") {
        document.getElementById("futureChartArea").style.display = "flex";
        document.getElementById("frame").onload = addHintToBarChart;
    } else {
        document.getElementById("futureChartArea").style.display = "none";
        document.getElementById("frame").onload = null;
    }
}

function showImage() {
    document.getElementById("futureChartArea").innerHTML = "";
    document.getElementById("futureChartArea").style.display = "none";
    document.getElementById("mainContainer").style.display = "none";
    document.getElementById("imageBox").style.display = "flex";
}

function addHintToBarChart() {
    const iframe = document.getElementById("frame");
    if (!iframe) return;

    // 轮询等待图表加载完成
    const timer = setInterval(() => {
        try {
            const chart = iframe.contentWindow.myChart;
            if (chart) {
                const hintText = " 点击新增柱体，查看未来走势详情";
                const verticalText = hintText.split('').join('\n');

                chart.setOption({
                    graphic: {
                        elements: [{
                            type: "text",
                            right: "6.5%",
                            top: "30%",
                            silent: true,
                            z: 100,
                            style: {
                                text: verticalText,
                                fontSize: 16,
                                fontWeight: "bold",
                                fill: "#ffffff",
                                opacity: 0.8,
                                textAlign: "center",
                                lineHeight: 20
                            }
                        }]
                    }
                });
                clearInterval(timer); // 找到后停止轮询
            }
        } catch (e) {}
    }, 100);
}

window.onload = function () {

    var iframe = document.getElementById('frame');

    // 默认首页直接添加提示
    addHintToBarChart();

    // 后续切换页面继续监听
    iframe.addEventListener('load', function () {

        if (iframe.src.includes('bar.html')) {
            addHintToBarChart();
        }

    });
};
</script>

</body>
</html>
