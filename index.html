
<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>市场分析Dashboard</title>
    <script src="https://assets.pyecharts.org/assets/v5/echarts.min.js"></script>
    <style>

    body{
        margin:0;
        background:#111;
        font-family:Arial;
    }

    .tab{
        background:#1b1b1b;
        padding:15px;
    }

    .tab button{

        background:#333;
        color:white;
        border:none;
        padding:12px 20px;
        margin-right:10px;
        border-radius:8px;
        cursor:pointer;
        font-size:15px;
    }

    .tab button:hover{
        background:#555;
    }

    /* 新增：左右布局 */

    .main-container{

        position:relative;

        width:100%;

        height:820px;
    }

    iframe{

        width:100%;

        height:100%;

        border:none;
    }
    #futureChartArea{

    width:100%;

    background:#111;

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    gap:20px;

    padding:20px;

    box-sizing:border-box;
    }

    .futureChartBox{

        width:520px;

        height:420px;

        background:#1b1b1b;

        border-radius:12px;

        padding:10px;
    }
    </style>
</head>


<body>
<div class="tab">

    <button onclick="changePage('bar.html')">
        每日成交额TOP50新增个股统计
    </button>

    <button onclick="changePage('heat.html')">
        新增股票行业热力分析
    </button>

    <button onclick="showImage()">
        新增股票行业热力图
    </button>

    <button onclick="changePage('timeline.html')">
        新增股票行业轮动
    </button>

</div>




<div class="main-container"
     id="mainContainer"
>

    <iframe
        id="frame"
        src="bar.html">
    </iframe>

</div>

<!-- 未来走势区域 -->
<div id="futureChartArea"></div>



<!-- 放图片 -->
<div
    id="imageBox"
    style="
        display:none;

        width:100%;
        height:900px;

        background:#111;

        justify-content:center;
        align-items:flex-star;

        padding:20px;
        box-sizing:border-box;
    "
>
    <img
        src="./new_heatmap.png"
        style="
            max-width:90%;
            max-height:800px; /* 限制最大高度，避免撑破容器 */
            height:auto;
            border-radius:12px;
            box-shadow:0 0 20px rgba(255,255,255,0.15);
        "
    >
</div>



<script>

function changePage(page) {

    // ======================
    // 清空 futureChartArea
    // ======================

    document.getElementById("futureChartArea").innerHTML = "";

    // ======================
    // 隐藏热力图
    // ======================

    document.getElementById("imageBox").style.display = "none";

    // ======================
    // 显示 iframe
    // ======================

    document.getElementById("mainContainer").style.display = "block";

    // ======================
    // 切换页面
    // ======================

    document.getElementById("frame").src = page;

    // ======================
    // bar 页面
    // ======================

    if (page === "bar.html") {

        document.getElementById("futureChartArea").style.display = "flex";

        document.getElementById("frame").onload = function () {

            addHintToBarChart();

        };

    }

    // ======================
    // 其他页面
    // ======================

    else {

        document.getElementById("futureChartArea").style.display = "none";

    }
}



// ======================
// 显示热力图
// ======================

function showImage() {

    // 清空 futureChartArea
    document.getElementById("futureChartArea").innerHTML = "";

    // 隐藏走势区域
    document.getElementById("futureChartArea").style.display = "none";

    // 隐藏 iframe
    document.getElementById("mainContainer").style.display = "none";

    // 显示图片
    document.getElementById("imageBox").style.display = "flex";
}



// ======================
// 添加提示语
// ======================

function addHintToBarChart() {
    const iframe = document.getElementById("frame");
    try {
        const chart = iframe.contentWindow.myChart;
        if (!chart) {
            console.warn("myChart 不存在");
            return;
        }

        // 将文字拆分成竖排：每个字后面加换行符
        const hintText = " 点击新增柱体，查看未来走势详情";
        const verticalText = hintText.split('').join('\n');

        chart.setOption({
            graphic: {
                elements: [
                    {
                        type: "text",
                        // 放在左侧垂直居中
                        left: "10%",   
                        top: "20%",   
                        silent: true,
                        z: 100,
                        style: {
                            text: verticalText, // 使用竖排文字
                            fontSize: 16,       // 侧面排版建议字体稍微调小一点
                            fontWeight: "bold",
                            fill: "#ffffff",
                            opacity: 0.8,
                            textAlign: "center", // 配合竖排，保持居中
                            lineHeight: 20       // 控制竖排时字与字的行高
                        }
                    }
                ]
            }
        });

    } catch (error) {
        console.warn(error);
    }
}

    // ========================
    // 页面初始加载时自动添加提示（仅当 iframe 为 bar.html）
    // ========================
    window.onload = function () {
        var iframe = document.getElementById('frame');
        // 监听 iframe 加载完成
        iframe.addEventListener('load', function () {
            if (iframe.src.includes('bar.html')) {
                addHintToBarChart();
            }
        });
        // 如果此时 iframe 已经加载完毕，手动调用一次
        if (iframe.contentDocument && iframe.contentDocument.readyState === 'complete') {
            if (iframe.src.includes('bar.html')) {
                addHintToBarChart();
            }
        }
    };
</script>

</body>



</script>


</body>
</html>
