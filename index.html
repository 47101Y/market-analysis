
<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>市场分析Dashboard</title>

    <style>

        body{
            margin:0;
            background:#111;
            font-family:Arial;
        }

        .tab{
            background:#1b1b1b;
            padding:15px;
        }

        .tab button{

            background:#333;
            color:white;
            border:none;
            padding:12px 20px;
            margin-right:10px;
            border-radius:8px;
            cursor:pointer;
            font-size:15px;
        }

        .tab button:hover{
            background:#555;
        }

        iframe{
            width:100%;
            height:900px;
            border:none;
        }

    </style>
</head>

<body>


<div class="tab">

    <button onclick="changePage('bar.html')">
        每日统计
    </button>

    <button onclick="changePage('heat.html')">
        行业热力
    </button>

    <button onclick="changePage('timeline.html')">
        行业轮动
    </button>

    <button onclick="showImage()">
        图片分析
    </button>

</div>


<iframe
    id="frame"
    src="bar.html">
</iframe>

<div id="imageBox" style="display:none;text-align:center;">

    <img
        src="新增个股行业热力图.png"
        style="
            width:90%;
            margin-top:20px;
            border-radius:12px;
        "
    >

</div>

<script>

function changePage(page){

    document.getElementById("frame").style.display = "block";

    document.getElementById("imageBox").style.display = "none";

    document.getElementById("frame").src = page;

}

function showImage(){

    document.getElementById("frame").style.display = "none";

    document.getElementById("imageBox").style.display = "block";

}

</script>

</body>
</html>
