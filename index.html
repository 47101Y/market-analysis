<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>每日成交额TOP50新增股票未来十日追踪</title>
    <script src="https://assets.pyecharts.org/assets/v5/echarts.min.js"></script>
    <style>

    body{
        margin:0;
        padding:0;
        background:#111;
        font-family:Arial;
        overflow-x: hidden;
    }

    .tab{
        background:#1b1b1b;
        padding:15px;
    }

    .tab button{
        background:#333;
        color:white;
        border:none;
        padding:12px 20px;
        margin-right:10px;
        border-radius:8px;
        cursor:pointer;
        font-size:15px;
    }

    .tab button:hover{
        background:#555;
    }

    .main-container{
        position:relative;
        width:100%;
        height: calc(100vh - 80px);
        background:#111;
        overflow:hidden;
    }

    iframe{
        width:100%;
        height:100%;
        border:none;
        background:transparent;
        margin:0;
        padding:0;
        display: block;
    }

    #futureChartArea{
        width:100%;
        background:#111;
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
        gap:20px;
        padding:20px;
        box-sizing:border-box;
    }

    .futureChartBox{
        width:520px;
        height:420px;
        background:#1b1b1b;
        border-radius:12px;
        padding:10px;
    }

    </style>
</head>

<body>

<div class="tab">
    <button onclick="changePage('bar.html')">每日成交额TOP50新增个股统计</button>
    <button onclick="changePage('heat.html')">新增股票行业热力分析</button>
    <button onclick="showImage()">新增股票行业热力图</button>
    <button onclick="changePage('timeline_v2.html')">新增股票行业轮动</button>
</div>

<div class="main-container" id="mainContainer">
    <iframe id="frame" src="bar.html"></iframe>
</div>

<!-- 未来走势区域 -->
<div id="futureChartArea"></div>

<!-- 放图片 -->
<div id="imageBox" style="
    display:none;
    width:100%;
    height:900px;
    background:#111;
    justify-content:center;
    align-items:flex-start;
    padding:20px;
    box-sizing:border-box;
">
    <img src="./new_heatmap.png" style="
        max-width:90%;
        max-height:800px;
        height:auto;
        border-radius:12px;
        box-shadow:0 0 20px rgba(255,255,255,0.15);
    ">
</div>

<script>
function changePage(page) {
    document.getElementById("futureChartArea").innerHTML = "";
    document.getElementById("imageBox").style.display = "none";
    document.getElementById("mainContainer").style.display = "block";
    document.getElementById("frame").src = page;

    if (page === "bar.html") {
        document.getElementById("futureChartArea").style.display = "flex";
        document.getElementById("frame").onload = addHintToBarChart;
    } else {
        document.getElementById("futureChartArea").style.display = "none";
    }
}

function showImage() {
    document.getElementById("futureChartArea").innerHTML = "";
    document.getElementById("futureChartArea").style.display = "none";
    document.getElementById("mainContainer").style.display = "none";
    document.getElementById("imageBox").style.display = "flex";
}

function addHintToBarChart() {
    const iframe = document.getElementById("frame");
    if (!iframe) return;

    // 轮询等待图表加载完成
    const timer = setInterval(() => {
        try {
            const chart = iframe.contentWindow.myChart;
            if (chart) {
                const hintText = " 点击新增柱体，查看未来走势详情";
                const verticalText = hintText.split('').join('\n');

                chart.setOption({
                    graphic: {
                        elements: [{
                            type: "text",
                            right: "6.5%",
                            top: "30%",
                            silent: true,
                            z: 100,
                            style: {
                                text: verticalText,
                                fontSize: 16,
                                fontWeight: "bold",
                                fill: "#ffffff",
                                opacity: 0.8,
                                textAlign: "center",
                                lineHeight: 20
                            }
                        }]
                    }
                });
                clearInterval(timer); // 找到后停止轮询
            }
        } catch (e) {}
    }, 100);
}

window.onload = function () {

    var iframe = document.getElementById('frame');

    // 默认首页直接添加提示
    addHintToBarChart();

    // 后续切换页面继续监听
    iframe.addEventListener('load', function () {

        if (iframe.src.includes('bar.html')) {
            addHintToBarChart();
        }

    });
};
</script>

</body>
</html>
