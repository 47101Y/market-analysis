<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>市场分析Dashboard</title>
    <script src="https://assets.pyecharts.org/assets/v5/echarts.min.js"></script>
    <style>
        body{
            margin:0;
            background:#111;
            font-family:Arial;
        }
        .tab{
            background:#1b1b1b;
            padding:15px;
        }
        .tab button{
            background:#333;
            color:white;
            border:none;
            padding:12px 20px;
            margin-right:10px;
            border-radius:8px;
            cursor:pointer;
            font-size:15px;
        }
        .tab button:hover{
            background:#555;
        }
        .main-container{
            position:relative;
            width:100%;
            height:820px;
        }
        iframe{
            width:100%;
            height:100%;
            border:none;
        }
        #futureChartArea{
            width:100%;
            background:#111;
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
            padding:20px;
            box-sizing:border-box;
        }
        .futureChartBox{
            width:520px;
            height:420px;
            background:#1b1b1b;
            border-radius:12px;
            padding:10px;
        }
        #imageBox{
            display:none;
            width:100%;
            height:900px;
            background:#111;
            justify-content:center;
            align-items:flex-start;
            padding:20px;
            box-sizing:border-box;
        }
    </style>
</head>

<body>

<div class="tab">
    <button onclick="changePage('bar.html')">每日成交额TOP50新增个股统计</button>
    <button onclick="changePage('heat.html')">新增股票行业热力分析</button>
    <button onclick="showImage()">新增股票行业热力图</button>
    <button onclick="changePage('timeline.html')">新增股票行业轮动</button>
</div>

<div class="main-container" id="mainContainer">
    <iframe id="frame" src="bar.html"></iframe>
</div>

<div id="futureChartArea"></div>

<div id="imageBox">
    <img src="./new_heatmap.png" style="max-width:90%;max-height:800px;height:auto;border-radius:12px;">
</div>

<script>
function changePage(page){
    document.getElementById("mainContainer").style.display = "block";
    document.getElementById("imageBox").style.display = "none";
    document.getElementById("frame").src = page;

    if(page === "bar.html"){
        document.getElementById("futureChartArea").style.display = "flex";
    }else{
        document.getElementById("futureChartArea").style.display = "none";
    }
}

function showImage(){
    document.getElementById("mainContainer").style.display = "none";
    document.getElementById("imageBox").style.display = "flex";
}
</script>

</body>
</html>
