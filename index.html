
<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>市场分析Dashboard</title>
    <script src="https://assets.pyecharts.org/assets/v5/echarts.min.js"></script>
    <style>

    body{
        margin:0;
        background:#111;
        font-family:Arial;
    }

    .tab{
        background:#1b1b1b;
        padding:15px;
    }

    .tab button{

        background:#333;
        color:white;
        border:none;
        padding:12px 20px;
        margin-right:10px;
        border-radius:8px;
        cursor:pointer;
        font-size:15px;
    }

    .tab button:hover{
        background:#555;
    }

    /* 新增：左右布局 */

    .main-container{

        position:relative;

        width:100%;

        height:820px;
    }

    iframe{

        width:100%;

        height:100%;

        border:none;
    }
    #futureChartArea{

    width:100%;

    background:#111;

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    gap:20px;

    padding:20px;

    box-sizing:border-box;
    }

    .futureChartBox{

        width:520px;

        height:420px;

        background:#1b1b1b;

        border-radius:12px;

        padding:10px;
    }
    </style>
</head>


<body>
<div class="tab">

    <button onclick="changePage('bar.html')">
        每日成交额TOP50新增个股统计
    </button>

    <button onclick="changePage('heat.html')">
        新增股票行业热力分析
    </button>

    <button onclick="showImage()">
        新增股票行业热力图
    </button>

    <button onclick="changePage('timeline.html')">
        新增股票行业轮动
    </button>

</div>




<div class="main-container"
     id="mainContainer"
>

    <iframe
        id="frame"
        src="bar.html">
    </iframe>

</div>

<!-- 未来走势区域 -->
<div id="futureChartArea"></div>



<!-- 放图片 -->
<div
    id="imageBox"
    style="
        display:none;

        width:100%;
        height:900px;

        background:#111;

        justify-content:center;
        align-items:flex-star;

        padding:20px;
        box-sizing:border-box;
    "
>
    <img
        src="./new_heatmap.png"
        style="
            max-width:90%;
            max-height:800px; /* 限制最大高度，避免撑破容器 */
            height:auto;
            border-radius:12px;
            box-shadow:0 0 20px rgba(255,255,255,0.15);
        "
    >
</div>



<script>
    // 切换页面的函数
    function changePage(page) {

        // 显示主图区域
        document.getElementById("mainContainer").style.display = "block";

        // 隐藏图片
        document.getElementById("imageBox").style.display = "none";

        // 切换 iframe
        document.getElementById("frame").src = page;

        // ====================== 控制 futureChartArea ======================
        if (page === "bar.html") {

            document.getElementById("futureChartArea").style.display = "flex";

            // 等 iframe 加载完成后再添加提示
            document.getElementById("frame").onload = function () {
                addHintToBarChart();
            };

        } else {

            document.getElementById("futureChartArea").style.display = "none";

        }
    }


    // 显示图片
    function showImage() {

        document.getElementById("mainContainer").style.display = "none";

        document.getElementById("imageBox").style.display = "flex";
    }


    // ====================== 添加提示语 ======================
    function addHintToBarChart() {

        const iframe = document.getElementById("frame");

        try {

            const iframeWindow = iframe.contentWindow;

            let chart = null;

            // 获取 iframe 中所有变量
            const keys = Object.keys(iframeWindow);

            // 查找 echarts 实例
            for (let key of keys) {

                if (
                    key.startsWith("chart_") &&
                    iframeWindow[key] &&
                    typeof iframeWindow[key].setOption === "function"
                ) {

                    chart = iframeWindow[key];
                    break;
                }
            }

            // 如果找到图表
            if (chart) {

                chart.setOption({

                    graphic: {

                        elements: [

                            {
                                type: "text",

                                left: "center",
                                top: "92%",

                                silent: true,

                                z: 100,

                                style: {

                                    text: "👆 点击新增柱体，查看未来走势详情",

                                    fontSize: 16,

                                    fontWeight: "bold",

                                    fill: "#ffffff",

                                    opacity: 0.9,

                                    textAlign: "center"
                                }
                            }
                        ]
                    }

                });

            } else {

                console.warn("没有找到 echarts 图表实例");

            }

        } catch (error) {

            console.warn("无法访问 iframe 内容:", error);

        }
    }
</script>


</body>
</html>
