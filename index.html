
<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>市场分析Dashboard</title>
    <script src="https://assets.pyecharts.org/assets/v5/echarts.min.js"></script>
    <style>

    body{
        margin:0;
        background:#111;
        font-family:Arial;
    }

    .tab{
        background:#1b1b1b;
        padding:15px;
    }

    .tab button{

        background:#333;
        color:white;
        border:none;
        padding:12px 20px;
        margin-right:10px;
        border-radius:8px;
        cursor:pointer;
        font-size:15px;
    }

    .tab button:hover{
        background:#555;
    }

    /* 新增：左右布局 */

    .main-container{

        position:relative;

        width:100%;

        height:820px;
    }

    iframe{

        width:100%;

        height:100%;

        border:none;
    }
    #futureChartArea{

    width:100%;

    background:#111;

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    gap:20px;

    padding:20px;

    box-sizing:border-box;
    }

    .futureChartBox{

        width:520px;

        height:420px;

        background:#1b1b1b;

        border-radius:12px;

        padding:10px;
    }
    </style>
</head>


<body>
<div class="tab">

    <button onclick="changePage('bar.html')">
        每日成交额TOP50新增个股统计
    </button>

    <button onclick="changePage('heat.html')">
        新增股票行业热力分析
    </button>

    <button onclick="showImage()">
        新增股票行业热力图
    </button>

    <button onclick="changePage('timeline.html')">
        新增股票行业轮动
    </button>

</div>




<div class="main-container"
     id="mainContainer"
>

    <iframe
        id="frame"
        src="bar.html">
    </iframe>

</div>

<!-- 未来走势区域 -->
<div id="futureChartArea"></div>



<!-- 放图片 -->
<div
    id="imageBox"
    style="
        display:none;

        width:100%;
        height:900px;

        background:#111;

        justify-content:center;
        align-items:flex-star;

        padding:20px;
        box-sizing:border-box;
    "
>
    <img
        src="./new_heatmap.png"
        style="
            max-width:90%;
            max-height:800px; /* 限制最大高度，避免撑破容器 */
            height:auto;
            border-radius:12px;
            box-shadow:0 0 20px rgba(255,255,255,0.15);
        "
    >
</div>



<script>
    // 切换页面的函数
    function changePage(page) {
        // 显示主图区域
        document.getElementById("mainContainer").style.display = "block";
        // 隐藏图片
        document.getElementById("imageBox").style.display = "none";
        // 切换 iframe
        document.getElementById("frame").src = page;

        // ====================== 控制 futureChartArea ======================
        if (page === "bar.html") {
            document.getElementById("futureChartArea").style.display = "flex";
            // 【新增】页面切换后，添加提示标语
            addHintToBarChart();
        } else {
            document.getElementById("futureChartArea").style.display = "none";
        }
    }

    function showImage() {
        document.getElementById("mainContainer").style.display = "none";
        document.getElementById("imageBox").style.display = "flex";
    }

    // 【新增函数】用于向 bar 图表中添加“点击提示”
    function addHintToBarChart() {
        // 防止 iframe 还没加载好就执行
        const iframe = document.getElementById('frame');
        
        // 尝试获取 iframe 内部的 echarts 实例
        let chart = null;
        
        try {
            // Pyecharts 默认会把 chart 对象挂在 window 对象上
            // 通常变量名是 chart_<chart_id> 或者直接是 chart
            // 这里需要一点“猜测”逻辑
            const iframeWindow = iframe.contentWindow;
            
            // 等待 iframe 加载完成并尝试获取 chart
            const tryGetChart = () => {
                // 这里的逻辑取决于 Pyecharts 生成的变量名
                // 常见的命名规则：
                // 1. 如果你设置了 chart_id: window['chart_' + chart_id]
                // 2. 或者直接是 window['chart']
                
                // 由于你之前的代码使用了 replace("__chartId__", str(bar.chart_id))
                // 我们可以推断变量名很可能是 chart_<id>
                
                // 获取 iframe 内的所有变量名
                const iframeKeys = Object.keys(iframeWindow);
                // 寻找以 chart_ 开头的变量
                for (let key of iframeKeys) {
                    if (key.startsWith('chart_') && iframeWindow[key] && typeof iframeWindow[key].setOption === 'function') {
                        chart = iframeWindow[key];
                        break;
                    }
                }
                
                // 如果找到了图表实例
                if (chart) {
                    // 1. 先移除之前可能存在的旧提示（防止重复添加）
                    chart.setOption({
                        graphic: null
                    }, {notMerge: false});

                    // 2. 添加新的提示文本
                    chart.setOption({
                        graphic: {
                            elements: [{
                                type: 'text',
                                shape: {
                                    // 这里的 x: 'center' y: '85%' 是相对于图表容器的位置
                                    // 你可以根据实际情况调整
                                    x: 'center',
                                    y: '85%' 
                                },
                                style: {
                                    text: '👆 点击新增柱体，查看未来走势详情',
                                    fontSize: 14,
                                    fontWeight: 'bold',
                                    fill: '#fff', // 白色文字
                                    align: 'center',
                                    verticalAlign: 'middle',
                                    opacity: 0.8
                                },
                                // 添加一个简单的淡入动画
                                animationType: 'fade',
                                animationDuration: 800,
                                animationEasing: 'quadraticOut'
                            }]
                        }
                    }, {notMerge: false});
                } else {
                    // 如果没找到，稍后重试（最多重试 3 次）
                    if (retryCount < 3) {
                        setTimeout(tryGetChart, 500);
                        retryCount++;
                    }
                }
            };
            
            let retryCount = 0;
            tryGetChart();
        } catch (error) {
            console.warn('无法访问 iframe 内容，可能跨域了，或者图表还没初始化:', error);
        }
    }
</script>


</body>
</html>
