    if(params.seriesName !== '新增') {
        return;
    }

    var date = params.name;

    var stocks = newData[date];

    if(!stocks) {
        return;
    }

    var area = parent.document.getElementById('futureChartArea');

    area.innerHTML = "";

    stocks.forEach(function(item) {

        var future = futureData[String(date)][String(item.stock)];

        if(!future) {
            return;
        }

        var div = parent.document.createElement('div');

        div.style.marginBottom = '30px';

        area.appendChild(div);

            background:#1f1f1f;

            border-radius:10px;
            color:white;

            width:100%;
            border-collapse:collapse;
            text-align:center;
            font-size:13px;
        ">

        <tr style="background:#333;">

            <th style="padding:8px;border:1px solid #555;">

            </th>

                收盘价
            </th>

            <th style="padding:8px;border:1px solid #555;">
                涨跌幅
            </th>

        </tr>
        `;

        future.forEach(function(row) {

            var pctColor =
                row.pct > 0
                ? '#ff4d4f'
                : (row.pct < 0 ? '#52c41a' : 'white');

            html += `

            <tr>

                <td style="
                    padding:6px;
                    border:1px solid #444;
                ">
                    ${row.day}
                </td>

                <td style="
                    padding:6px;
                    border:1px solid #444;
                ">
                    ${row.open}
                </td>

                <td style="
                    padding:6px;
                    border:1px solid #444;
                ">
                    ${row.close}
                </td>

                <td style="
                    padding:6px;
                    border:1px solid #444;
                    color:${pctColor};
                    font-weight:bold;
                ">
                    ${(row.pct * 100).toFixed(2)}%
                </td>

            </tr>
            `;
        });

        html += `
        </table>
        </div>
        `;

        div.innerHTML = html;

    });
